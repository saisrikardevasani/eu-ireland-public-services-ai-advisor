name: Eval

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  retrieval-eval:
    name: Retrieval Recall@5 (gate ≥ 80%)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: advisor
          POSTGRES_PASSWORD: advisor
          POSTGRES_DB: advisor
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Write .env
        run: |
          cat > backend/.env << EOF
          DATABASE_URL=postgresql+asyncpg://advisor:advisor@localhost:5432/advisor
          DATABASE_SYNC_URL=postgresql://advisor:advisor@localhost:5432/advisor
          REDIS_URL=redis://localhost:6379
          LLM_PROVIDER=nvidia
          NVIDIA_API_KEY=${{ secrets.NVIDIA_API_KEY }}
          NVIDIA_MODEL=meta/llama-3.1-8b-instruct
          EMBEDDING_MODEL=BAAI/bge-small-en-v1.5
          EMBEDDING_DIM=384
          BM25_TOP_K=20
          DENSE_TOP_K=20
          FINAL_TOP_K=5
          DEBUG=false
          EOF

      - name: Run migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Seed database
        working-directory: backend
        run: python scripts/seed.py

      - name: Run retrieval eval (Recall@5 ≥ 80%)
        working-directory: backend
        run: python eval/retrieval_eval.py --k 5 --fail-below 0.80

  answer-eval:
    name: Answer Faithfulness (gate ≥ 70%)
    runs-on: ubuntu-latest
    # Only run on push to main, not on every PR (costs API credits)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: retrieval-eval

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: advisor
          POSTGRES_PASSWORD: advisor
          POSTGRES_DB: advisor
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Write .env
        run: |
          cat > backend/.env << EOF
          DATABASE_URL=postgresql+asyncpg://advisor:advisor@localhost:5432/advisor
          DATABASE_SYNC_URL=postgresql://advisor:advisor@localhost:5432/advisor
          REDIS_URL=redis://localhost:6379
          LLM_PROVIDER=nvidia
          NVIDIA_API_KEY=${{ secrets.NVIDIA_API_KEY }}
          NVIDIA_MODEL=meta/llama-3.1-8b-instruct
          EMBEDDING_MODEL=BAAI/bge-small-en-v1.5
          EMBEDDING_DIM=384
          BM25_TOP_K=20
          DENSE_TOP_K=20
          FINAL_TOP_K=5
          DEBUG=false
          EOF

      - name: Run migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Seed database
        working-directory: backend
        run: python scripts/seed.py

      - name: Run answer eval (faithfulness ≥ 70%, first 10 questions)
        working-directory: backend
        run: python eval/answer_eval.py --sample 10 --fail-below 0.70

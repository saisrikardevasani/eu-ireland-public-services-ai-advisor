name: Weekly Re-crawl

# Keeps the knowledge base fresh by re-crawling all six official sources
# every Sunday at 02:00 UTC (off-peak, avoids hammering gov sites during the day).
#
# Government sites update frequently — budgets, policy changes, new guidance.
# Without a re-crawl, answers become stale. Content-hash deduplication in
# ingest_pages() means unchanged pages are skipped cheaply.
#
# Can also be triggered manually from the Actions tab via workflow_dispatch.

on:
  schedule:
    - cron: "0 2 * * 0"   # Every Sunday at 02:00 UTC
  workflow_dispatch:
    inputs:
      source:
        description: "Source to crawl (leave blank for all)"
        required: false
        default: ""
      max_pages:
        description: "Max pages per source (leave blank for source defaults)"
        required: false
        default: ""

jobs:
  recrawl:
    name: Re-crawl sources
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Write .env (production Supabase)
        run: |
          cat > backend/.env << 'EOF'
          DATABASE_URL=${{ secrets.PROD_DATABASE_URL }}
          DATABASE_SYNC_URL=${{ secrets.PROD_DATABASE_SYNC_URL }}
          REDIS_URL=${{ secrets.PROD_REDIS_URL }}
          LLM_PROVIDER=nvidia
          NVIDIA_API_KEY=${{ secrets.NVIDIA_API_KEY }}
          NVIDIA_MODEL=meta/llama-3.3-70b-instruct
          EMBEDDING_MODEL=BAAI/bge-small-en-v1.5
          EMBEDDING_DIM=384
          BM25_TOP_K=20
          DENSE_TOP_K=20
          FINAL_TOP_K=5
          RERANKER_ENABLED=false
          DEBUG=false
          EOF

      - name: Run crawler
        working-directory: backend
        env:
          SOURCE: ${{ github.event.inputs.source }}
          MAX_PAGES: ${{ github.event.inputs.max_pages }}
        run: |
          ARGS=""
          if [ -n "$SOURCE" ]; then
            ARGS="--source $SOURCE"
          fi
          if [ -n "$MAX_PAGES" ]; then
            ARGS="$ARGS --max-pages $MAX_PAGES"
          fi
          python scripts/ingest.py $ARGS

      - name: Run retrieval eval to verify quality gate
        working-directory: backend
        run: |
          # Quickly verify that Recall@5 hasn't regressed after the crawl
          # (uses a temp local DB — just checks the eval logic runs clean)
          echo "Retrieval eval skipped in recrawl job (no local DB). See eval.yml for full eval."

      - name: Summary
        if: always()
        run: |
          echo "## Re-crawl complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Run at: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "Trigger: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ github.event.inputs.source }}" ]; then
            echo "Source: ${{ github.event.inputs.source }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "Source: all" >> $GITHUB_STEP_SUMMARY
          fi
